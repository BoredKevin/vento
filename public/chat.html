<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vento - Chat</title>
  <meta name="description" content="Anonymous chat session on Vento.">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="chat-container">
    <!-- Connection bar -->
    <div class="connection-bar" id="connection-bar">
      Connection lost. Reconnecting...
    </div>

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-header-callsign" id="chat-callsign">-</span>
        <div class="chat-header-status">
          <span class="status-dot offline" id="chat-status-dot"></span>
          <span id="chat-status-text">Kevin is offline</span>
        </div>
      </div>
      <button class="btn-end" id="btn-end-session">End Session</button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="message system">
        <span class="message-content">Your messages are anonymous. Be kind to yourself and others.</span>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Kevin is typing...</span>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chat-input"
                  placeholder="Type your message..."
                  rows="1" maxlength="2000"></textarea>
        <button class="btn-send" id="btn-send" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
